name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npx vitest run
      - run: npm run build
      - name: Install ffmpeg for smoke test
        run: brew install ffmpeg || true
      - name: Smoke test (real export pipeline)
        run: npx playwright test tests/e2e/smoke.spec.ts
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/

  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: blockout-mac
          path: release/*.dmg
